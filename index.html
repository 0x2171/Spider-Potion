<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Spider Potion/title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bad+Script&display=swap" rel="stylesheet">
  <style>
    *, ::before, ::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      background-color: #263826;
      overflow: hidden;
      touch-action: none;
    }

    body::after {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      content: '';
      z-index: -4;
      background: radial-gradient(ellipse at center, transparent 35%, rgba(0, 0, 0, 0.85) 100%);
      pointer-events: none;
    }

    .title {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-family: 'Bad Script', 'Caveat', cursive, sans-serif;
      font-size: clamp(2.5rem, 7vw, 4rem);
      color: #d4f1d4;
      text-align: center;
      white-space: nowrap;
      text-shadow: 
        0 0 12px rgba(60, 179, 113, 0.6), 
        0 3px 6px rgba(0, 0, 0, 0.5);
      letter-spacing: 2px;
      line-height: 1.1;
      user-select: none;
    }

    .highlight {
      position: absolute;
      z-index: 1;
      background-color: rgba(255, 255, 255, 0.35);
      border-radius: 50%;
      animation: shimmer 3s ease-in-out infinite;
    }

    .highlight:nth-child(1) {
      top: 20px;
      left: 90px;
      width: 20px;
      height: 40px;
      animation-delay: 0s;
    }

    .highlight:nth-child(2) {
      top: 80px;
      left: 40px;
      width: 60px;
      height: 100px;
      transform: rotate(35deg);
      animation-delay: 0.5s;
    }

    .highlight:nth-child(3) {
      top: 60%;
      right: 50px;
      width: 20px;
      height: 40px;
      transform: rotate(45deg);
      animation-delay: 1s;
    }

    .container {
      position: relative;
      display: flex;
      min-width: 260px;
      min-height: 360px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      perspective: 1000px;
    }

    .top, .throat {
      position: relative;
      margin: auto;
      border: 8px solid #2a4a2a;
      background-color: rgba(180, 235, 180, 0.3);
      z-index: 10;
    }

    .top {
      margin-bottom: -25px;
      width: 150px;
      height: 45px;
      border-radius: .35em;
      animation: glassGlow 4s ease-in-out infinite;
    }

    .throat {
      margin-bottom: -22px;
      width: 120px;
      height: 35px;
    }

    .throat::after {
      position: absolute;
      content: '';
      top: 0;
      left: 0;
      z-index: -1;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
    }

    @keyframes glassGlow {
      0%, 100% { box-shadow: 0 0 10px rgba(180, 235, 180, 0.3); }
      50% { box-shadow: 0 0 25px rgba(180, 235, 180, 0.6); }
    }

    .flask {
      position: relative;
      z-index: -2;
      overflow: hidden;
      display: flex;
      width: 260px;
      height: 260px;
      align-items: flex-end;
      border: 8px solid #2a4a2a;
      border-radius: 50%;
      background-color: rgba(180, 235, 180, 0.3);
      box-shadow: inset 0 0 30px rgba(255,255,255,0.2);
      transition: transform 0.1s ease-out;
    }

    .flask .potion {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 200%;
      height: 65%;
      border-radius: 59% 41% 52% 48% / 100% 100% 0% 0%;
      background-color: #3cb371;
      border-top: 8px solid #2a4a2a;
      background-image: 
        linear-gradient(215deg, #3cb371, #006400),
        radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.25) 0%, transparent 40%),
        radial-gradient(ellipse at 70% 60%, rgba(255,255,255,0.15) 0%, transparent 50%);
      background-blend-mode: screen, normal;
      transition: transform 0.15s ease-out;
      animation: liquidSlosh 3s ease-in-out infinite;
      opacity: 0.92;
    }

    .potion::before {
      content: '';
      position: absolute;
      top: -8px;
      left: 0;
      width: 100%;
      height: 24px;
      background: 
        linear-gradient(to bottom, 
          rgba(255,255,255,0.5) 0%, 
          rgba(255,255,255,0.25) 40%, 
          transparent 100%);
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
      animation: wave 2.2s ease-in-out infinite;
      opacity: 0.7;
    }

    .potion::after {
      content: '';
      position: absolute;
      top: -6px;
      left: 0;
      width: 100%;
      height: 18px;
      background: 
        linear-gradient(to bottom,
          rgba(255,255,255,0.35) 0%,
          transparent 100%);
      border-radius: 45% 45% 0 0 / 80% 80% 0 0;
      animation: waveSecondary 2.8s ease-in-out infinite reverse;
      opacity: 0.5;
      pointer-events: none;
    }

    .potion .caustics {
      position: absolute;
      top: 15%;
      left: 15%;
      right: 15%;
      bottom: 10%;
      background: 
        radial-gradient(ellipse at 25% 30%, rgba(255,255,255,0.35) 0%, transparent 50%),
        radial-gradient(ellipse at 75% 60%, rgba(255,255,255,0.25) 0%, transparent 45%),
        radial-gradient(ellipse at 50% 80%, rgba(255,255,255,0.15) 0%, transparent 60%);
      animation: causticMove 4s ease-in-out infinite;
      pointer-events: none;
      opacity: 0.6;
    }

    @keyframes liquidSlosh {
      0%, 100% { transform: translateX(-50%) rotate(0deg); }
      25% { transform: translateX(-48%) rotate(-0.8deg); }
      75% { transform: translateX(-52%) rotate(0.8deg); }
    }

    @keyframes wave {
      0%, 100% { 
        transform: scaleX(1) translateX(0); 
        opacity: 0.65;
        border-radius: 50% 50% 0 0 / 100% 100% 0 0;
      }
      25% {
        border-radius: 48% 52% 0 0 / 98% 102% 0 0;
      }
      50% { 
        transform: scaleX(1.05) translateX(2%); 
        opacity: 0.8;
        border-radius: 52% 48% 0 0 / 102% 98% 0 0;
      }
      75% {
        border-radius: 49% 51% 0 0 / 99% 101% 0 0;
      }
    }

    @keyframes waveSecondary {
      0%, 100% { 
        transform: scaleX(0.95) translateX(-1%); 
        opacity: 0.4;
      }
      50% { 
        transform: scaleX(1.02) translateX(1%); 
        opacity: 0.6;
      }
    }

    @keyframes causticMove {
      0%, 100% { 
        transform: translate(0, 0) scale(1); 
        opacity: 0.55;
      }
      25% { transform: translate(2%, -1%) scale(1.02); }
      50% { 
        transform: translate(-1%, 2%) scale(0.98); 
        opacity: 0.7;
      }
      75% { transform: translate(1%, 1%) scale(1.01); }
    }

    .shadow {
      position: relative;
      margin: auto;
      margin-top: 15px;
      width: 200px;
      height: 40px;
      border-radius: 50%;
      background-color: rgba(42, 74, 42, 0.2);
      animation: shadowPulse 4s ease-in-out infinite;
    }

    @keyframes shadowPulse {
      0%, 100% { transform: scale(1); opacity: 0.2; }
      50% { transform: scale(1.05); opacity: 0.3; }
    }

    .dots {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .dots .dot {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background-color: #2a4a2a;
      animation: floatDot 6s ease-in-out infinite;
    }

    .dots .dot:nth-child(1) { top: 60%; left: -20px; animation-delay: 0s; }
    .dots .dot:nth-child(2) { top: 40%; left: -30px; animation-delay: 0.5s; }
    .dots .dot:nth-child(3) { top: 25%; left: -55px; animation-delay: 1s; }
    .dots .dot:nth-child(4) { top: 20%; left: 15px; animation-delay: 1.5s; }
    .dots .dot:nth-child(5) { top: 10%; left: -20px; animation-delay: 2s; }
    .dots .dot:nth-child(6) { top: -10%; left: 10px; animation-delay: 2.5s; }
    .dots .dot:nth-child(7) { top: -5%; left: 27%; animation-delay: 3s; }
    .dots .dot:nth-child(8) { top: -5%; left: 40%; animation-delay: 3.5s; }
    .dots .dot:nth-child(9) { top: -13%; left: 50%; animation-delay: 4s; }
    .dots .dot:nth-child(10) { top: -5%; left: 55%; animation-delay: 4.5s; }
    .dots .dot:nth-child(11) { top: 8%; right: 5%; animation-delay: 0.3s; }
    .dots .dot:nth-child(12) { top: 8%; right: -8%; animation-delay: 0.8s; }
    .dots .dot:nth-child(13) { top: 20%; right: -7%; animation-delay: 1.3s; }
    .dots .dot:nth-child(14) { top: 40%; right: -7%; animation-delay: 1.8s; }
    .dots .dot:nth-child(15) { top: 70%; right: -10%; animation-delay: 2.3s; }
    .dots .dot:nth-child(16) { bottom: 40%; left: 30%; animation-delay: 2.8s; }
    .dots .dot:nth-child(17) { bottom: 43%; left: 35%; animation-delay: 3.3s; }
    .dots .dot:nth-child(18) { bottom: 30%; left: 45%; animation-delay: 3.8s; }
    .dots .dot:nth-child(19) { bottom: 55%; right: 25%; animation-delay: 4.3s; }
    .dots .dot:nth-child(20) { bottom: 48%; right: 20%; animation-delay: 4.8s; }

    @keyframes floatDot {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
      50% { transform: translateY(-10px) scale(1.2); opacity: 1; }
    }
  
    .potion .inner-glow {
      position: absolute;
      top: 20%;
      left: 20%;
      right: 20%;
      bottom: 15%;
      background: radial-gradient(ellipse at center, 
        rgba(255,255,255,0.25) 0%, 
        rgba(255,255,255,0.08) 40%, 
        transparent 75%);
      border-radius: 50%;
      animation: glowPulse 3s ease-in-out infinite;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.65; transform: scale(1.03); }
    }

    @media (max-width: 400px) {
      .flask { width: 220px; height: 220px; }
      .top { width: 120px; }
      .throat { width: 95px; }
      .potion { width: 180%; }
      .title { font-size: clamp(2rem, 8vw, 3rem); top: 20px; }
    }
  </style>
</head>
<body>
  <h1 class="title">Касипожное зелье</h1>
  <div class="container">
    <div class="dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="highlights">
      <div class="highlight"></div>
      <div class="highlight"></div>
      <div class="highlight"></div>
    </div>
    <div class="top"></div>
    <div class="throat"></div>
    <div class="flask" id="flask">
      <div class="potion" id="potion">
        <div class="caustics"></div>
        <div class="inner-glow"></div>
      </div>
    </div>
    <div class="shadow"></div>
  </div>
</body>
</html>
